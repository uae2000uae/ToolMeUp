<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ToolMeUp — Free browser tools</title>
  <meta name="description" content="ToolMeUp is a small collection of free, browser-based utilities: a wheel & tire fitment calculator, a wget-style downloader, a DualShock controller tuner, and more.">
  <meta name="theme-color" content="#2563eb">

  <!-- Open Graph / social -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="ToolMeUp — Free browser tools">
  <meta property="og:description" content="A small collection of free, browser-based utilities.">
  <meta property="og:image" content="web-app-icon-512.png">

  <!-- Icons / PWA -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">ToolMeUp</div>
    <div class="header-controls menu-wrap">
      <button id="menuBtn" class="menu-btn" type="button" aria-label="Menu" aria-expanded="false" aria-haspopup="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
      </button>
      <div id="menuDropdown" class="menu-dropdown" hidden>
        <a href="fitment.html">
          <svg class="menu-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a9 9 0 100 18 9 9 0 000-18zm0 4a5 5 0 110 10 5 5 0 010-10zm0 3a2 2 0 100 4 2 2 0 000-4z"/></svg>
          Fitment</a>
        <a href="wget.html">
          <svg class="menu-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v10m0 0l-4-4m4 4l4-4M5 17v2a2 2 0 002 2h10a2 2 0 002-2v-2"/></svg>
          Wget</a>
        <a href="Dualshock-tool/index.html">
          <svg class="menu-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 10h4M8 8v4m6-1h.01M17 10h.01M7 6h10a4 4 0 014 4l1 6a2.5 2.5 0 01-4.6 1.4L15 14H9l-2.4 3.4A2.5 2.5 0 012 16l1-6a4 4 0 014-4z"/></svg>
          DualShock-Tool</a>
        <div class="menu-sep"></div>
        <label class="toggle">
          <svg class="menu-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <span>Dark</span>
          <input type="checkbox" id="themeToggle">
        </label>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1 class="hero__title">Free browser tools</h1>
      <p class="hero__lead">A small, growing collection of utilities that run entirely in your browser — nothing is uploaded to a server.</p>
    </section>

    <section class="tool-grid" data-tool-cards>
      <!-- Cards are rendered from the TOOLS manifest in shared.js -->
    </section>
  </main>

  <footer class="app-footer">
    <div>Static HTML/CSS/JS • Runs entirely in your browser</div>
  </footer>

  <script src="shared.js"></script>
</body>
</html>
