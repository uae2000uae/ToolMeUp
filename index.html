<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ToolMeUp — Free browser tools</title>
  <meta name="description" content="ToolMeUp is a small collection of free, browser-based utilities: a wheel & tire fitment calculator, a wget-style downloader, a DualShock controller tuner, and more.">
  <meta name="theme-color" content="#2563eb">

  <!-- Open Graph / social -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="ToolMeUp — Free browser tools">
  <meta property="og:description" content="A small collection of free, browser-based utilities.">
  <meta property="og:image" content="web-app-icon-512.png">

  <!-- Icons / PWA -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Shared top navigation: injected from base.html by shared.js -->
  <header class="app-header" data-shared-header data-brand="ToolMeUp"></header>

  <main class="container">
    <section class="hero">
      <h1 class="hero__title">Free browser tools</h1>
      <p class="hero__lead">A small, growing collection of utilities that run entirely in your browser — nothing is uploaded to a server.</p>
    </section>

    <section class="tool-grid" data-tool-cards>
      <!-- Cards are rendered from the TOOLS manifest in shared.js -->
    </section>
  </main>

  <footer class="app-footer">
    <div>Static HTML/CSS/JS • Runs entirely in your browser</div>
  </footer>

  <script src="shared.js"></script>
</body>
</html>
